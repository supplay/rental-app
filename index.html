<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スキーレンタル予約</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff; color: #1a1a1a; }
        .card { border: 2px solid #000; border-radius: 0; }
        .card-header { background: #000; color: #fff; border-radius: 0; font-weight: bold; }
        .btn-black { background: #000; color: #fff; border-radius: 0; width: 100%; padding: 12px; }
        .form-control { border: 1px solid #000; border-radius: 0; }
        .form-select { 
            padding: 12px;
            border: 2px solid #000;
            border-radius: 0;
            font-weight: bold;
        }
        .item-group { border: 1px solid #000; padding: 12px; margin-bottom: 12px; }
        .item-group-title { font-size: 0.85rem; font-weight: bold; letter-spacing: 0.08em; margin-bottom: 10px; }
        .item-option { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid #ddd; }
        .item-option:first-child { border-top: 0; padding-top: 0; }
        .item-option:last-child { padding-bottom: 0; }
        .item-option input { margin-top: 0; }
        .item-option-label { display: flex; justify-content: space-between; width: 100%; gap: 12px; font-weight: normal; }
        .form-text-note { color: #666; font-size: 0.85rem; }
        .frame-box {
            border: 2px solid #000;
            outline: 2px solid #000;
            outline-offset: -8px;
            padding: 20px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg border-bottom border-dark mb-5">
        <div class="container py-3">
            <a class="navbar-brand fw-bold" href="home.html">SNOWBOARD RENTAL SHOP #910</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="home.html">HOME</a>
                <a class="nav-link" href="price.html">PRICE</a>
                <a class="nav-link" href="index.html">RENTAL</a>
                <a class="nav-link" href="delivery.html">DELIVERY</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 frame-box" style="max-width: 500px;">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">スノーボードレンタル予約</div>
            <div class="card-body">
                <form id="reservationForm">
                    <div class="mb-3">
                        <label class="form-label">予約日</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">お名前</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">レンタルアイテム</label>
                        <div id="itemOptions"></div>
                        <div class="form-text-note mt-2">必要なアイテムを複数選択できます。</div>
                    </div>

                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="deliveryCheck" data-price="500">
                            <label class="form-check-label" for="deliveryCheck">お届けサービスを利用する (+¥500)</label>
                        </div>
                    </div>

                    <div class="alert alert-dark text-end">
                        合計金額: <span id="totalPrice" class="fs-4 fw-bold">¥0</span>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">ブーツサイズ</label>
                            <select id="bootSize" class="form-select">
                                <option value="なし">なし</option>
                                <option value="22.0cm">22.0cm</option>
                                <option value="22.5cm">22.5cm</option>
                                <option value="23.0cm">23.0cm</option>
                                <option value="23.5cm">23.5cm</option>
                                <option value="24.0cm">24.0cm</option>
                                <option value="24.5cm">24.5cm</option>
                                <option value="25.0cm">25.0cm</option>
                                <option value="25.5cm">25.5cm</option>
                                <option value="26.0cm">26.0cm</option>
                                <option value="26.5cm">26.5cm</option>
                                <option value="27.0cm">27.0cm</option>
                                <option value="27.5cm">27.5cm</option>
                                <option value="28.0cm">28.0cm</option>
                            </select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">ウェアサイズ</label>
                            <select id="wearSize" class="form-select">
                                <option value="なし">なし</option>
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L">L</option>
                                <option value="XL">XL</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-black w-100">予約する</button>
                </form>
            </div>
        </div>
    </div>
    <script>
        const API_URL = "https://w276lcl832.execute-api.ap-northeast-1.amazonaws.com/prod/";

        // ページ読み込み時に「今日」より前の日付を選べないようにする
        const today = new Date().toISOString().split('T')[0];
        const dateInput = document.getElementById('date');
        dateInput.setAttribute('min', today);
        dateInput.value = today;

        const ITEM_GROUPS = [
            {
                label: 'スノーボード',
                items: [
                    { value: 'ボード3点フルセット', price: 4500 },
                    { value: 'ボード2点セット', price: 3000 },
                    { value: 'ボードウェア上下', price: 2500 },
                    { value: 'ボードのみ', price: 1980 },
                    { value: 'ブーツのみ', price: 2000 },
                ],
            },
            {
                label: 'キッズ (小学生以下)',
                items: [
                    { value: 'キッズ3点フルセット', price: 3000 },
                    { value: 'キッズ2点セット', price: 2500 },
                    { value: 'キッズウェア上下', price: 1500 },
                    { value: 'キッズボードのみ', price: 1980 },
                    { value: 'キッズブーツのみ', price: 1000 },
                ],
            },
            {
                label: 'スキー',
                items: [
                    { value: 'スキー4点セット', price: 4500 },
                    { value: 'スキー3点セット', price: 3000 },
                    { value: 'スキーウェア上下', price: 2500 },
                    { value: 'スキー板のみ', price: 1980 },
                    { value: 'スキーブーツのみ', price: 2000 },
                    { value: 'ストックのみ', price: 1000 },
                ],
            }
        ];

        // 選択アイテムの金額マップ
        const PRICE_MAP = {
            'ボード3点フルセット': 4500, 'ボード2点セット': 3000, 'ボードウェア上下': 2500,
            'ボードのみ': 1980, 'ブーツのみ': 2000,
            'キッズ3点フルセット': 3000, 'キッズ2点セット': 2500, 'キッズウェア上下': 1500,
            'キッズボードのみ': 1980, 'キッズブーツのみ': 1000,
            'スキー4点セット': 4500, 'スキー3点セット': 3000, 'スキーウェア上下': 2500,
            'スキー板のみ': 1980, 'スキーブーツのみ': 2000, 'ストックのみ': 1000
        };
        const BOOT_REQUIRED = ['ボード3点フルセット', 'ボード2点セット', 'ブーツのみ',
                               'キッズ3点フルセット', 'キッズ2点セット', 'キッズブーツのみ',
                               'スキー4点セット', 'スキー3点セット', 'スキーブーツのみ'];
        const WEAR_REQUIRED = ['ボード3点フルセット', 'ボードウェア上下',
                               'キッズ3点フルセット', 'キッズウェア上下',
                               'スキー4点セット', 'スキーウェア上下'];

        const itemOptions = document.getElementById('itemOptions');
        itemOptions.innerHTML = ITEM_GROUPS.map((group) => `
            <div class="item-group">
                <div class="item-group-title">${group.label}</div>
                ${group.items.map((item) => `
                    <label class="item-option">
                        <input type="checkbox" class="form-check-input rental-item-checkbox" value="${item.value}">
                        <span class="item-option-label">
                            <span>${item.value}</span>
                            <span>¥${item.price.toLocaleString()}</span>
                        </span>
                    </label>
                `).join('')}
            </div>
        `).join('');

        function getSelectedItems() {
            return Array.from(document.querySelectorAll('.rental-item-checkbox:checked')).map((checkbox) => checkbox.value);
        }

        function calculateTotal() {
            let total = 0;
            const selectedItems = getSelectedItems();
            selectedItems.forEach((selectedItem) => {
                if (PRICE_MAP[selectedItem]) {
                    total += PRICE_MAP[selectedItem];
                }
            });
            if (document.getElementById('deliveryCheck').checked) {
                total += 500;
            }
            document.getElementById('totalPrice').innerText = '¥' + total.toLocaleString();
            return total;
        }

        document.querySelectorAll('.rental-item-checkbox').forEach((checkbox) => {
            checkbox.addEventListener('change', calculateTotal);
        });
        document.getElementById('deliveryCheck').addEventListener('change', calculateTotal);
        calculateTotal();

        document.getElementById('reservationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const selectedItems = getSelectedItems();
            const isDelivery = document.getElementById('deliveryCheck').checked;
            const bootSize = document.getElementById('bootSize').value;
            const wearSize = document.getElementById('wearSize').value;

            if (!selectedItems.length) {
                alert('レンタルアイテムを選択してください。');
                return;
            }

            if (selectedItems.length !== new Set(selectedItems).size) {
                alert('同じアイテムは重複して選択できません。');
                return;
            }

            if (selectedItems.some((selectedItem) => BOOT_REQUIRED.includes(selectedItem)) && bootSize === 'なし') {
                alert('ブーツサイズを選択してください。');
                return;
            }

            if (selectedItems.some((selectedItem) => WEAR_REQUIRED.includes(selectedItem)) && wearSize === 'なし') {
                alert('ウェアサイズを選択してください。');
                return;
            }
            
            const reservationId = Date.now().toString();
            const totalPrice = document.getElementById('totalPrice').innerText;
            const reservationData = {
                date: document.getElementById('date').value,
                name: document.getElementById('name').value,
                item: selectedItems.join(' / '),
                delivery: isDelivery ? '利用する' : '利用しない',
                size: `ブーツ:${bootSize} / ウェア:${wearSize}`,
                price: totalPrice,
                totalPrice: totalPrice,
                status: '未読',
                reservationId: reservationId
            };

            const reservations = JSON.parse(localStorage.getItem('reservations') || '[]');
            reservations.push(reservationData);
            localStorage.setItem('reservations', JSON.stringify(reservations));

            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(reservationData)
            });

            if (res.ok) {
                alert("予約が完了しました！");
                window.location.reload();
                return;
            }

            alert('ローカル保存で予約を記録しました（API送信は失敗しました）。');
            window.location.reload();
        });
    </script>
</body>
</html>
